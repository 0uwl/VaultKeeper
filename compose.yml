name: vaultkeeper
services:
  couchdb:
    image: couchdb:3.3
    restart: unless-stopped
    container_name: couchdb
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD is required}
    volumes:
      - couchdb-data:/opt/couchdb/data
      - couchdb-etc:/opt/couchdb/etc/local.d
    ports:
      - "5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  server:
    image: ghcr.io/0uwl/vaultkeeper:latest
    restart: unless-stopped
    container_name: vaultkeeper
    volumes:
      - logs:/var/log/vaultkeeper.log
    depends_on:
      couchdb:
        condition: service_healthy
    environment:
      COUCHDB_HOST: couchdb
      COUCHDB_PORT: ${COUCHDB_PORT:-5984}
      COUCHDB_PROTOCOL: ${COUCHDB_PROTOCOL:-http}
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:?COUCHDB_PASSWORD is required}
      COUCHDB_PUBLIC_URL: ${COUCHDB_PUBLIC_URL:-}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      TZ: ${TZ:-UTC}
    ports:
      - "5985:5985"

volumes:
  logs:
  couchdb-data:
  couchdb-etc:
